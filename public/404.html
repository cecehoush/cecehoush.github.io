<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Cece Housh — Portfolio</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // GitHub Pages serves this 404 page for any unknown path (e.g. /portfolio
      // on a hard refresh). It redirects to index.html, preserving the path so
      // React Router can pick it up. The matching restore script lives in
      // index.html.
      // 0 segments kept because the site is served from the apex of a custom
      // domain (cecehoush.com, base '/').
      var pathSegmentsToKeep = 0;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
